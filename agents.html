<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCena Agent Console</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede8;
    --text: #1a1a18; --text2: #6b6b66; --text3: #9b9b96;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --purple: #7F77DD; --purple-bg: #EEEDFE; --purple-text: #26215C;
    --green-bg: #E1F5EE; --green-text: #04342C;
    --red-bg: #FCEBEB; --red-text: #501313;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #242422; --bg3: #2c2c2a;
      --text: #e8e6de; --text2: #9b9996; --text3: #6b6b66;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --purple-bg: #26215C; --purple-text: #CECBF6;
      --green-bg: #04342C; --green-text: #9FE1CB;
      --red-bg: #501313; --red-text: #F09595;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg3); color: var(--text); font-size: 14px; min-height: 100vh; }
  .app { max-width: 900px; margin: 0 auto; padding: 20px; }

  /* header */
  .header { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; margin-bottom: 14px; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 28px; height: 28px; border-radius: 7px; background: var(--purple); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--green-bg); color: var(--green-text); font-weight: 500; }

  /* nav */
  .agent-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .nav-btn { display: flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); cursor: pointer; font-family: inherit; color: var(--text); transition: all 0.15s; }
  .nav-btn.active { border-color: var(--active-color); background: var(--active-muted); }
  .nav-num { font-size: 11px; padding: 1px 6px; border-radius: 3px; background: var(--bg3); color: var(--text2); font-weight: 500; }
  .nav-btn.active .nav-num { color: white; background: var(--active-color); }
  .nav-label { font-size: 12px; font-weight: 500; }
  .nav-btn.active .nav-label { color: var(--active-color); }
  .nav-desc { font-size: 10px; color: var(--text3); }

  /* panel */
  .panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 18px; }
  .panel-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 0.5px solid var(--border); }
  .panel-dot { width: 8px; height: 8px; border-radius: 50%; }
  .panel-title { font-size: 13px; font-weight: 500; }
  .panel-desc { font-size: 11px; color: var(--text3); }

  /* form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field-label { font-size: 11px; color: var(--text2); }
  .field-opt { color: var(--text3); }
  input, select, textarea { font-size: 13px; padding: 7px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-family: inherit; width: 100%; }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--purple); outline-offset: 1px; }
  textarea { resize: vertical; height: 70px; }
  .full { grid-column: 1 / -1; }

  /* mode pills */
  .mode-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .pill { font-size: 12px; padding: 5px 11px; border-radius: 6px; border: 0.5px solid var(--border2); background: var(--bg2); cursor: pointer; font-family: inherit; color: var(--text); transition: background 0.15s; }
  .pill.active { color: white; border-color: transparent; }

  /* run button */
  .run-btn { font-size: 13px; padding: 8px 20px; border-radius: var(--radius); border: none; color: white; cursor: pointer; font-family: inherit; font-weight: 500; transition: opacity 0.15s; }
  .run-btn:disabled { cursor: wait; opacity: 0.7; }

  /* output */
  .output { margin-top: 16px; background: var(--bg); border-radius: var(--radius-lg); padding: 16px; }
  .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .output-label { font-size: 12px; font-weight: 500; }
  .output-meta { font-size: 11px; color: var(--text3); margin-left: 8px; }
  .output-text { font-size: 13px; line-height: 1.7; white-space: pre-wrap; max-height: 480px; overflow-y: auto; }
  .output-actions { display: flex; gap: 6px; }

  /* small btns */
  .btn-sm { font-size: 11px; padding: 3px 9px; border-radius: 5px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); cursor: pointer; font-family: inherit; }
  .btn-sm:hover { background: var(--bg3); }

  /* error */
  .error { font-size: 12px; color: #E24B4A; margin-bottom: 10px; }

  /* alert box */
  .alert-box { font-size: 12px; padding: 8px 12px; border-radius: 7px; margin-bottom: 10px; border-left: 3px solid #E24B4A; background: var(--red-bg); color: var(--red-text); grid-column: 1/-1; }

  /* lang selector */
  .lang-wrap { display: flex; align-items: center; gap: 8px; }
  .lang-wrap label { font-size: 11px; color: var(--text2); white-space: nowrap; }
  .lang-wrap select { width: auto; font-size: 12px; padding: 5px 8px; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* library */
  .lib-toolbar { display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
  .lib-search { font-size:13px; padding:7px 10px; border-radius:var(--radius); border:0.5px solid var(--border2); background:var(--bg); color:var(--text); font-family:inherit; width:220px; }
  .lib-empty { font-size:13px; color:var(--text3); padding:40px; text-align:center; }
  .lib-card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:14px; margin-bottom:8px; }
  .lib-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
  .lib-card-meta { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .lib-tag { font-size:11px; padding:2px 7px; border-radius:4px; background:var(--bg2); color:var(--text2); }
  .lib-card-preview { font-size:12px; color:var(--text2); line-height:1.6; max-height:60px; overflow:hidden; white-space:pre-wrap; }
  .lib-card-full { font-size:12px; line-height:1.7; white-space:pre-wrap; margin-top:8px; padding-top:8px; border-top:0.5px solid var(--border); }
  .lib-date { font-size:11px; color:var(--text3); }
  .saved-toast { position:fixed; bottom:20px; right:20px; background:#1D9E75; color:white; font-size:12px; padding:8px 14px; border-radius:var(--radius); font-family:inherit; opacity:0; transition:opacity 0.3s; pointer-events:none; }
  .saved-toast.show { opacity:1; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const PROXY     = "https://mycena-crm-proxy.julia-aa4.workers.dev/anthropic";
const SUPABASE  = "https://mycena-crm-proxy.julia-aa4.workers.dev";

const LANGUAGES = ["English","French","German","Spanish","Italian","Portuguese","Dutch","Polish","Swedish","Norwegian"];
const ROLES     = ["CISO","CTO","Risk & Compliance","CFO","Board member","IT Director","IT Manager"];
const SECTORS   = ["Financial services","BPO","MSP","Critical infrastructure","Healthcare","Government/Defence","Retail","Manufacturing","Professional services","Logistics","Technology","Other"];
const LADDER    = ["1 — Out of control","2 — Aware but undefended","3 — Partial control","4 — Full control"];
const HEADCOUNTS= ["<500","500–2k","2k–10k","10k+"];
const STAGES_CRM= ["Identified","Contacted","Engaged","Assessment booked","Assessment delivered","Internal selling","Commercial","Closed won","Closed lost","Nurture"];
const RISKS     = ["GREEN","AMBER","RED"];

const AGENTS = [
  { id:"01", label:"Brand Strategy",      color:"#7F77DD", muted:"#EEEDFE", desc:"Brand voice & positioning" },
  { id:"02", label:"Content",             color:"#378ADD", muted:"#E6F1FB", desc:"Whitepapers & long-form" },
  { id:"03", label:"Campaign",            color:"#EF9F27", muted:"#FAEEDA", desc:"Ads, emails & landing pages" },
  { id:"04", label:"PR & Media",          color:"#D4537E", muted:"#FBEAF0", desc:"Press & reactive" },
  { id:"05", label:"Sales Enablement",    color:"#639922", muted:"#EAF3DE", desc:"Decks, objections & battlecards" },
  { id:"06", label:"Data & Intelligence", color:"#888780", muted:"#F1EFE8", desc:"Exposure figures & proof" },
  { id:"07", label:"Performance",         color:"#7F77DD", muted:"#EEEDFE", desc:"Drift, deal health & gaps" },
  { id:"11", label:"ICP & Niche",         color:"#1D9E75", muted:"#E1F5EE", desc:"Targeting intelligence & segmentation" },
  { id:"12", label:"Ads Testing",         color:"#D85A30", muted:"#FAECE7", desc:"Ad variants & test briefs" },
];

const BRAND_RULES = `Non-negotiable rules:
- Central argument: architectural, not incremental. Every security tool operates AFTER authentication. MyCena operates AT the credential layer.
- Physical key analogy: "You wouldn't give every employee a master key to every room in your building. But that is exactly what most organisations do with digital credentials."
- Never use: solution, robust, seamless, industry-leading, cutting-edge, best-in-class
- Never describe MyCena as IAM, PAM, SSO, or MFA
- Use named real incidents (SolarWinds, Colonial Pipeline, Kaseya, M&S, Jaguar) — never hypotheticals
- Only CTA: Board-Level Risk Assessment
- Four-level persuasion: 1) Emotional truth 2) Structural diagnosis 3) Proof 4) Solution`;

const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const sel = (arr, val) => arr.map(o=>`<option value="${esc(o)}"${o===val?" selected":""}>${esc(o)}</option>`).join("");

let state = { view:"console", agent:"01", lang:"English", phases:{}, outputs:{}, errors:{}, library:[], libSearch:"", libExpanded:{}, libLoading:false };

async function callClaude(userPrompt, systemPrompt) {
  const body = { model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:userPrompt}] };
  if (systemPrompt) body.system = systemPrompt;
  const res = await fetch(PROXY, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
  const data = await res.json();
  return data.content?.[0]?.text || "";
}

const p05ctx = (role,sector,extra="") =>
`You are MyCena's Sales Enablement Agent. Reason from first principles.
Role: ${role} | Sector: ${sector}${extra}
Return: 1) Primary motivation 2) Internal pressures 3) How they buy 4) Top 2 objections + responses 5) Single most important thing MyCena must demonstrate. Be specific.`;

const p06ctx = (sector,headcount="",ladder="",incident="") =>
`You are MyCena's Data & Intelligence Agent. Reason from first principles.
Sector: ${sector}${headcount?` | Headcount: ${headcount}`:""}${ladder?` | Ladder: ${ladder}`:""}${incident?`\nIncident: ${incident}`:""}
Return: 1) Most relevant named incident + cost 2) Regulatory pressure 3) Credential failure mode 4) Proof data to shift belief 5) Native sector language. Real figures only.`;

// ── per-agent state ──────────────────────────────────────────────────────────
const agentState = {
  "01":{ mode:"Generation", ctype:"Campaign brief", role:"CISO", sector:"Financial services", topic:"", review:"" },
  "02":{ role:"CISO", sector:"Financial services", ctype:"Whitepaper", ladder:"2 — Aware but undefended", angle:"" },
  "03":{ role:"CISO", sector:"Financial services", channel:"LinkedIn ad", campaign:"Always-on brand", ladder:"2 — Aware but undefended", brief:"" },
  "04":{ mode:"Reactive — breach response", sector:"Financial services", assetType:"Full reactive pack", pressTarget:"Security press", incident:"", brief:"" },
  "05":{ role:"CISO", sector:"Financial services", assetType:"Board presentation deck", ladder:"2 — Aware but undefended", headcount:"500–2k", dealValue:"", exposure:"", brief:"" },
  "06":{ mode:"Exposure calculation", sector:"Financial services", headcount:"500–2k", dealValue:"", exposure:"", ticketVol:"", hourlyRate:"", incident:"", brief:"" },
  "07":{ mode:"Deal health check", sector:"Financial services", role:"CISO", dealStage:"Engaged", ladder:"2 — Aware but undefended", risk:"AMBER", daysIdle:"", lastAct:"", content:"", brief:"" },
  "11":{ mode:"Quarterly ICP report", sector:"Financial services", brief:"", campaignContext:"", adsContext:"" },
  "12":{ mode:"Ad variants", platform:"LinkedIn", campaignType:"Conversion — bottom of funnel", format:"Single image ad", segment:"CISO direct", sector:"Financial services", ladder:"2 — Aware but undefended", incident:"", hypothesis:"", brief:"" },
};

const ASSET_MAP_04 = {
  "Reactive — breach response":["Full reactive pack","Incident summary card","CEO quote only","Social post"],
  "Proactive — media asset":["Press release","Award submission","Analyst briefing","Journalist pitch — security press","Journalist pitch — business press"],
  "Executive prep":["Interview Q&A prep","Key message brief","On-record statement"],
};
const MODES_06 = ["Exposure calculation","Sector threat profile","Incident deep-dive","Proof data pack","Regulatory briefing"];
const MODES_07 = ["Deal health check","Brand drift audit","Content gap audit","Conversion analysis","Agent improvement brief"];
const MODES_11 = ["Quarterly ICP report","Monthly signal report","Niche opportunity analysis","Urgent flag check"];
const MODES_12 = ["Ad variants","Test brief"];
const PLATFORMS_12 = ["LinkedIn","Google Ads","Both"];
const CAMPAIGN_TYPES_12 = ["Awareness — top of funnel","Consideration — middle of funnel","Conversion — bottom of funnel","Incident reactive","Brand defence","Competitor conquest"];
const AD_FORMATS_12 = ["Single image ad","Carousel ad","Video ad script","Document ad","Conversation ad","Thought leader ad","Google search ad"];
const SEGMENTS_12 = ["CISO direct","Security leadership","Board & CEO","CFO","IT leadership","Sector-specific"];
const CTYPES_01 = ["Campaign brief","Messaging framework","Audience narrative","Website copy","Email","LinkedIn post","Press release"];
const CTYPES_02 = ["Whitepaper","Breach anatomy article","CISO board brief template","Analyst-facing narrative","Executive opinion piece","LinkedIn long-form","Case study narrative","Regulatory briefing"];
const CHANNELS_03 = ["LinkedIn ad","Cold email — first touch","Email nurture sequence","Landing page","Retargeting ad","Event follow-up","LinkedIn long-form post"];
const CAMPAIGNS_03 = ["Always-on brand","Incident reactive","Sector-specific","Control Ladder nurture","Assessment conversion","Closed-lost re-engagement"];
const ASSETS_05 = ["Board presentation deck","CFO one-pager","Objection handling guide","Competitive battlecard","Champion toolkit","Internal business case","Executive summary","Procurement / security questionnaire responses"];
const MODE_COLORS_07 = {"Deal health check":"#378ADD","Brand drift audit":"#D4537E","Content gap audit":"#639922","Conversion analysis":"#EF9F27","Agent improvement brief":"#7F77DD"};

// ── prompt builders ──────────────────────────────────────────────────────────
async function buildPrompts(id) {
  const s = agentState[id]; const lang = state.lang;

  if (id==="01") {
    const [c5,c6] = await Promise.all([callClaude(p05ctx(s.role,s.sector)), callClaude(p06ctx(s.sector))]);
    const sys = `You are the Brand Strategy Agent for MyCena.\n${BRAND_RULES}\nSALES BRIEFING:\n${c5}\nDATA BRIEFING:\n${c6}\nWhen reviewing: Voice/Proof/Audience/Control Ladder check then verdict: APPROVED / APPROVED WITH EDITS / REQUIRES REVISION.\nRespond in ${lang}.`;
    const user = s.mode==="Generation" ? `Mode: Generation\nContent type: ${s.ctype}\nAudience: ${s.role}\nSector: ${s.sector}\nTopic: ${s.topic||"Use judgement."}` : `Mode: Review\nAudience: ${s.role}\nSector: ${s.sector}\nContent:\n${s.review}`;
    return {sys,user};
  }
  if (id==="02") {
    const [c5,c6] = await Promise.all([callClaude(p05ctx(s.role,s.sector)), callClaude(p06ctx(s.sector,"",s.ladder))]);
    const sys = `You are the Content & Thought Leadership Agent for MyCena.\n${BRAND_RULES}\nSALES BRIEFING:\n${c5}\nDATA BRIEFING:\n${c6}\nNever open with "In today's rapidly evolving threat landscape." Checklist: named incident + cost / physical key analogy / single audience / Ladder stage / no hypotheticals / CTA = Board-Level Risk Assessment.\nRespond in ${lang}.`;
    const user = `Content type: ${s.ctype}\nAudience: ${s.role}\nSector: ${s.sector}\nControl Ladder: ${s.ladder}\nAngle: ${s.angle||"Use judgement."}`;
    return {sys,user};
  }
  if (id==="03") {
    const [c5,c6] = await Promise.all([callClaude(p05ctx(s.role,s.sector)), callClaude(p06ctx(s.sector,"",s.ladder))]);
    const sys = `You are the Campaign & Demand Generation Agent for MyCena.\n${BRAND_RULES}\nSALES BRIEFING:\n${c5}\nDATA BRIEFING:\n${c6}\nChannel rules: LinkedIn — stop scroll, never open with question. Cold email 1 — never mention product. Landing pages — headline = problem, sub = structural gap, one named incident, CTA = book assessment. Never "learn more"/"explore"/"find out how". Email nurture 5 stages: problem → incident pattern → structural diagnosis → proof → conversion.\nRespond in ${lang}.`;
    const user = `Channel: ${s.channel}\nCampaign: ${s.campaign}\nAudience: ${s.role}\nSector: ${s.sector}\nControl Ladder: ${s.ladder}\nBrief: ${s.brief||"Use judgement."}`;
    return {sys,user};
  }
  if (id==="04") {
    const modeColor = s.mode==="Reactive — breach response"?"#E24B4A":s.mode==="Proactive — media asset"?"#1D9E75":"#7F77DD";
    const [c5,c6] = await Promise.all([
      callClaude(`You are MyCena's media relations specialist. What does ${s.pressTarget} want from a cybersecurity story? What makes a MyCena CEO quote independently quotable? What kills credibility with this audience?`),
      callClaude(p06ctx(s.sector,"","",s.incident))
    ]);
    const sys = `You are the PR & Media Agent for MyCena.\n${BRAND_RULES}\nMEDIA BRIEFING:\n${c5}\nDATA BRIEFING:\n${c6}\nRules: Security press = technical pattern first. Business press = financial/human consequence first. Never same pitch to both. CEO quotes must survive removal from context — no passive voice. Flag if credential involvement unconfirmed. Reactive pack = incident summary card + pattern match + cost projection + structural fix statement + CEO quote.\nRespond in ${lang}.`;
    const user = `Mode: ${s.mode}\nAsset: ${s.assetType}\nSector: ${s.sector}\nPress target: ${s.pressTarget}\n${s.incident?`Incident: ${s.incident}\n`:""}Brief: ${s.brief||"Use judgement."}`;
    return {sys,user};
  }
  if (id==="05") {
    const [c5,c6] = await Promise.all([callClaude(p05ctx(s.role,s.sector,`\nAsset: ${s.assetType} | Ladder: ${s.ladder}`)), callClaude(p06ctx(s.sector,s.headcount))]);
    const sys = `You are the Sales Enablement Agent for MyCena.\n${BRAND_RULES}\nBUYING SITUATION:\n${c5}\nDATA INTELLIGENCE:\n${c6}\nRules: Board deck opens with named sector incident — never company overview. CFO one-pager leads with exposure figure: monthly cost + SLA risk = annual exposure, MyCena cost, net saving, payback period. Objections: (1) Already have Okta/Azure AD → MyCena fills the gap they don't cover. (2) No IT resource → overlay, 4 weeks. (3) No breach yet → Colonial Pipeline hadn't either. (4) Board won't prioritise → M&S lost £300M in 5 weeks. Never position against Okta/Azure AD — real displacement is the spreadsheet and manual checklist.\nRespond in ${lang}.`;
    const user = `Asset: ${s.assetType}\nRole: ${s.role}\nSector: ${s.sector}\nLadder: ${s.ladder}\nHeadcount: ${s.headcount}\n${s.dealValue?`Deal value: £${s.dealValue}\n`:""}${s.exposure?`Exposure: £${s.exposure}\n`:""}Brief: ${s.brief||"Use judgement."}`;
    return {sys,user};
  }
  if (id==="06") {
    const ctx = await callClaude(`Operational context for ${s.sector}, headcount ${s.headcount}: typical IT helpdesk structure, credential ticket volume, SLA/contractual framework, regulatory environment, common credential failure mode, what good governance looks like vs industry average. Be specific.`);
    const sys = `You are the Data & Intelligence Agent for MyCena — the proof layer.\nOPERATIONAL CONTEXT:\n${ctx}\nRules: Primary sources only (IBM, Verizon DBIR, Ponemon, official filings). Distinguish mean/median/max cost. Flag sources >3 years. Flag all estimates. Core figures: avg breach $4.88M (IBM 2024), 80%+ credential-involved (Verizon DBIR), 194 days avg detection (IBM 2024), Colonial Pipeline $4.4M, M&S £300M+ (Q1 2025), SolarWinds $100M+. Exposure: monthly tickets × £25 + SLA risk + staff downtime = annual exposure.\nRespond in ${lang}.`;
    const user = `Mode: ${s.mode}\nSector: ${s.sector}\nHeadcount: ${s.headcount}\n${s.dealValue?`Deal value: £${s.dealValue}\n`:""}${s.exposure?`Known exposure: £${s.exposure}\n`:""}${s.ticketVol?`Monthly tickets: ${s.ticketVol}\n`:""}${s.hourlyRate?`Hourly rate: £${s.hourlyRate}\n`:""}${s.incident?`Incident: ${s.incident}\n`:""}Brief: ${s.brief||"Produce most useful output for this mode."}`;
    return {sys,user};
  }
  if (id==="11") {
    const s = agentState["11"];
    // Pull live CRM data from Supabase
    let crmData = "";
    try {
      const res = await fetch(`${SUPABASE}/deals?order=created_at.desc&limit=200`, {
        headers:{"Content-Type":"application/json","Prefer":"return=representation"}
      });
      const deals = await res.json();
      const won    = deals.filter(d=>d.stage==="Closed won");
      const lost   = deals.filter(d=>d.stage==="Closed lost");
      const stalled= deals.filter(d=>d.days_since_activity>10 && !["Closed won","Closed lost"].includes(d.stage));
      const active = deals.filter(d=>!["Closed won","Closed lost","Nurture"].includes(d.stage));
      crmData = `LIVE CRM DATA (${deals.length} total deals):
Closed won (${won.length}): ${JSON.stringify(won.map(d=>({company:d.company,sector:d.sector,headcount:d.headcount,value:d.deal_value,ladder:d.control_ladder,source:d.source})))}
Closed lost (${lost.length}): ${JSON.stringify(lost.map(d=>({company:d.company,sector:d.sector,headcount:d.headcount,value:d.deal_value,ladder:d.control_ladder,notes:d.notes})))}
Stalled deals (${stalled.length}): ${JSON.stringify(stalled.map(d=>({company:d.company,sector:d.sector,stage:d.stage,days_idle:d.days_since_activity,risk:d.risk})))}
Active pipeline (${active.length}): ${JSON.stringify(active.map(d=>({company:d.company,sector:d.sector,stage:d.stage,value:d.deal_value,ladder:d.control_ladder})))}`;
    } catch(e) { crmData = "CRM data unavailable — analyse based on sector and market knowledge."; }

    const sys = `You are the ICP & Niche Agent for MyCena. Your job is to continuously refine targeting intelligence — which organisations, in which sectors, of which size, with which characteristics, are most likely to buy MyCena fast.

Core belief: The ICP is a living model updated by every closed deal, every lost deal, and every sector event that changes urgency.

ICP dimensions to maintain (Tier 1/2/3 rankings):
- Sector: rank by conversion rate, deal velocity, average contract value, expansion potential
- Headcount bands: <500, 500–2k, 2k–10k, 10k+
- Third-party vendor count as leading indicator of credential sprawl
- Trigger events: sector breach, new CISO appointment, M&A activity, regulatory enforcement

${BRAND_RULES}

${crmData}

// ── run agent ────────────────────────────────────────────────────────────────
async function runAgent(id) {
  state.phases[id] = "Briefing context agents..."; state.errors[id] = ""; render();
  try {
    const {sys,user} = await buildPrompts(id);
    state.phases[id] = "Generating output..."; render();
    const result = await callClaude(user, sys);
    state.outputs[id] = result;
  } catch(e) { state.outputs[id] = "Agent unavailable — check connection."; }
  state.phases[id] = null; render();
}

async function saveOutput(id) {
  const s = agentState[id];
  const ag = AGENTS.find(a=>a.id===id);
  const payload = {
    agent_id:    id,
    agent_label: ag.label,
    sector:      s.sector||"",
    role:        s.role||"",
    language:    state.lang,
    mode:        s.mode||"",
    asset_type:  s.assetType||s.ctype||s.channel||"",
    brief:       s.brief||s.topic||s.angle||"",
    output:      state.outputs[id]||""
  };
  try {
    await fetch(`${SUPABASE}/content`, {
      method:"POST", headers:{"Content-Type":"application/json","Prefer":"return=minimal"},
      body:JSON.stringify(payload)
    });
    showToast("Saved to library");
  } catch(e) { showToast("Save failed — check connection"); }
}

function showToast(msg) {
  let t = document.getElementById("toast");
  if (!t) { t = document.createElement("div"); t.id="toast"; t.className="saved-toast"; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2500);
}

async function loadLibrary() {
  state.libLoading = true; render();
  try {
    const res = await fetch(`${SUPABASE}/content?order=created_at.desc&limit=200`, {
      headers:{"Content-Type":"application/json","Prefer":"return=representation"}
    });
    state.library = await res.json();
  } catch(e) { state.library = []; }
  state.libLoading = false; render();
}

async function deleteContent(id) {
  await fetch(`${SUPABASE}/content?id=eq.${id}`, { method:"DELETE", headers:{"Content-Type":"application/json"} });
  state.library = state.library.filter(c=>c.id!==id);
  render();
}

function toggleExpand(id) { state.libExpanded[id]=!state.libExpanded[id]; render(); }
function setLibSearch(v) { state.libSearch=v; render(); }

function clearOutput(id) { state.outputs[id] = null; render(); }
function copyOutput(id) { navigator.clipboard?.writeText(state.outputs[id]||""); }

          <button class="btn-sm" onclick="saveOutput('${id}')">Save to library</button>
          <button class="btn-sm" onclick="copyOutput('${id}')">Copy</button>
          <button class="btn-sm" onclick="clearOutput('${id}')">✕</button>
        </div>
      </div>
      <div class="output-text">${esc(output)}</div>
    </div>` : "";

  return `
    <div class="panel-header">
      <div class="panel-dot" style="background:${color}"></div>
      <span class="panel-title">Agent ${id} — ${ag.label}</span>
      <span class="panel-desc">${ag.desc}</span>
    </div>
    ${modesHtml}
    <div class="form-grid">${fieldsHtml}</div>
    ${textareaHtml}
    <button class="run-btn" style="background:${color}" onclick="runAgent('${id}')" ${running?"disabled":""}>
      ${running?`<span class="spinner"></span>${esc(phase)}`:"Run →"}
    </button>
    ${outputHtml}
  `;
}

function pills(arr, active, id, field, color) {
  return `<div class="mode-pills">${arr.map(m=>`<button class="pill${m===active?" active":""}" style="${m===active?`background:${color};`:""}" onclick="setField('${id}','${field}',this.textContent.trim())">${esc(m)}</button>`).join("")}</div>`;
}
function field(labelHtml, inputHtml) {
  return `<div class="field" style="margin-bottom:12px"><label class="field-label">${labelHtml}</label>${inputHtml}</div>`;
}
function hexToMuted(hex) {
  const map={"#7F77DD":"#CECBF6","#378ADD":"#B5D4F4","#EF9F27":"#FAC775","#D4537E":"#F4C0D1","#639922":"#C0DD97","#888780":"#D3D1C7","#E24B4A":"#F7C1C1","#1D9E75":"#9FE1CB"};
  return map[hex]||"#D3D1C7";
}

// ── main render ──────────────────────────────────────────────────────────────
function renderLibrary() {
  const q = state.libSearch.toLowerCase();
  const items = state.library.filter(c =>
    !q || c.agent_label?.toLowerCase().includes(q) || c.sector?.toLowerCase().includes(q) ||
    c.role?.toLowerCase().includes(q) || c.output?.toLowerCase().includes(q) || c.asset_type?.toLowerCase().includes(q)
  );
  if (state.libLoading) return `<div class="lib-empty">Loading library...</div>`;
  if (!items.length) return `<div class="lib-empty">${state.libSearch?"No results found.":"No saved content yet. Run an agent and click Save to library."}</div>`;
  return items.map(c => {
    const expanded = state.libExpanded[c.id];
    const ag = AGENTS.find(a=>a.id===c.agent_id);
    const color = ag?.color||"#888780";
    const date = new Date(c.created_at).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
    return `
      <div class="lib-card">
        <div class="lib-card-header">
          <div>
            <span style="font-size:12px;font-weight:500;color:${color}">Agent ${c.agent_id} — ${esc(c.agent_label)}</span>
            <span class="lib-date" style="margin-left:8px">${date}</span>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn-sm" onclick="navigator.clipboard?.writeText(${JSON.stringify(c.output||'').replace(/"/g,'&quot;')})">Copy</button>
            <button class="btn-sm" onclick="toggleExpand('${c.id}')">${expanded?"Collapse":"Expand"}</button>
            <button class="btn-sm" style="color:#E24B4A" onclick="deleteContent('${c.id}')">Delete</button>
          </div>
        </div>
        <div class="lib-card-meta">
          ${c.sector?`<span class="lib-tag">${esc(c.sector)}</span>`:""}
          ${c.role?`<span class="lib-tag">${esc(c.role)}</span>`:""}
          ${c.asset_type?`<span class="lib-tag">${esc(c.asset_type)}</span>`:""}
          ${c.language?`<span class="lib-tag">${esc(c.language)}</span>`:""}
          ${c.mode?`<span class="lib-tag">${esc(c.mode)}</span>`:""}
        </div>
        ${expanded
          ? `<div class="lib-card-full">${esc(c.output||"")}</div>`
          : `<div class="lib-card-preview">${esc((c.output||"").slice(0,200))}${(c.output||"").length>200?"...":""}</div>`}
      </div>`;
  }).join("");
}

function render() {
  const ag = AGENTS.find(a=>a.id===state.agent);
  document.getElementById("app").innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="logo"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="white"/><rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity=".7"/><rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity=".7"/><rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity=".4"/></svg></div>
        <span style="font-size:15px;font-weight:500">MyCena Agent Console</span>
        <span class="badge">7 agents</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="display:flex;gap:6px">
          <button class="btn-sm" style="${state.view==="console"?"background:var(--purple);color:white;border-color:var(--purple)":""}" onclick="state.view='console';render()">Console</button>
          <button class="btn-sm" style="${state.view==="library"?"background:var(--purple);color:white;border-color:var(--purple)":""}" onclick="state.view='library';loadLibrary()">Library</button>
        </div>
        <div class="lang-wrap">
          <label>Language</label>
          <select onchange="state.lang=this.value;render()">${sel(LANGUAGES,state.lang)}</select>
        </div>
      </div>
    </div>
    ${state.view==="console" ? `
      <div class="agent-nav">
        ${AGENTS.map(a=>`
          <button class="nav-btn${state.agent===a.id?" active":""}" style="--active-color:${a.color};--active-muted:${a.muted}" onclick="state.agent='${a.id}';render()">
            <span class="nav-num">${a.id}</span>
            <div>
              <div class="nav-label">${esc(a.label)}</div>
              <div class="nav-desc">${esc(a.desc)}</div>
            </div>
          </button>`).join("")}
      </div>
      <div class="panel">${renderPanel(state.agent)}</div>
    ` : `
      <div class="panel">
        <div class="panel-header">
          <div class="panel-dot" style="background:var(--purple)"></div>
          <span class="panel-title">Content library</span>
          <span class="panel-desc">All saved agent outputs</span>
        </div>
        <div class="lib-toolbar">
          <input class="lib-search" type="text" placeholder="Search by agent, sector, role, content..." value="${esc(state.libSearch)}" oninput="setLibSearch(this.value)">
          <span style="font-size:11px;color:var(--text3)">${state.library.length} item${state.library.length!==1?"s":""}</span>
        </div>
        ${renderLibrary()}
      </div>
    `}
  `;
}

render();
</script>
</body>
</html>
