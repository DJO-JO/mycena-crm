<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCena CRM</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede8;
    --text: #1a1a18; --text2: #6b6b66; --text3: #9b9b96;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --purple: #7F77DD; --purple-bg: #EEEDFE; --purple-text: #26215C;
    --green-bg: #E1F5EE; --green-text: #04342C;
    --amber-bg: #FAEEDA; --amber-text: #412402;
    --red-bg: #FCEBEB; --red-text: #501313;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #242422; --bg3: #2c2c2a;
      --text: #e8e6de; --text2: #9b9996; --text3: #6b6b66;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --purple-bg: #26215C; --purple-text: #CECBF6;
      --green-bg: #04342C; --green-text: #9FE1CB;
      --amber-bg: #412402; --amber-text: #FAC775;
      --red-bg: #501313; --red-text: #F09595;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg3); color: var(--text); font-size: 14px; min-height: 100vh; }
  .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .auth-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: 16px; padding: 36px; width: 100%; max-width: 400px; }
  .auth-logo { width: 40px; height: 40px; border-radius: 10px; background: var(--purple); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  .auth-title { font-size: 18px; font-weight: 500; text-align: center; margin-bottom: 6px; }
  .auth-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 28px; }
  .auth-field { margin-bottom: 14px; }
  .auth-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; }
  .auth-input { width: 100%; font-size: 14px; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-family: inherit; }
  .auth-input:focus { outline: 2px solid var(--purple); outline-offset: 1px; }
  .auth-btn { width: 100%; padding: 11px; background: var(--purple); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; margin-top: 6px; transition: opacity 0.15s; }
  .auth-btn:hover { opacity: 0.9; }
  .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .auth-error { font-size: 12px; color: #E24B4A; padding: 8px 12px; background: var(--red-bg); border-radius: var(--radius); margin-bottom: 14px; }
  .app { max-width: 1400px; margin: 0 auto; padding: 20px; }
  .header { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; margin-bottom: 14px; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 28px; height: 28px; border-radius: 7px; background: var(--purple); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header-title { font-size: 15px; font-weight: 500; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--green-bg); color: var(--green-text); font-weight: 500; }
  .user-email { font-size: 11px; color: var(--text3); }
  .header-right { display: flex; gap: 6px; align-items: center; }
  .btn { font-size: 12px; padding: 7px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn:hover { background: var(--bg3); }
  .btn-primary { background: var(--purple); color: white; border-color: var(--purple); }
  .btn-primary:hover { opacity: 0.9; background: var(--purple); }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-ghost { background: none; border-color: transparent; color: var(--text2); }
  .btn-ghost:hover { background: var(--bg2); }
  .btn-agent08 { font-size: 10px; padding: 3px 8px; border-radius: 4px; background: var(--purple-bg); color: var(--purple-text); border: 0.5px solid var(--purple); cursor: pointer; font-family: inherit; font-weight: 500; transition: opacity 0.15s; white-space: nowrap; }
  .btn-agent08:hover { opacity: 0.8; }
  .btn-agent08:disabled { opacity: 0.5; cursor: wait; }
  .metrics { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 14px; }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: 10px 14px; }
  .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 500; }
  .metric-value.alert { color: #E24B4A; }
  input[type=text], input[type=number], input[type=email], input[type=password], input[type=date], select, textarea {
    font-size: 13px; padding: 7px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2);
    background: var(--bg); color: var(--text); font-family: inherit; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--purple); outline-offset: 1px; }

  .pipeline-inner { display: flex; gap: 10px; min-width: max-content; }
  .column { width: 200px; flex-shrink: 0; }
  .col-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .col-title { font-size: 11px; font-weight: 500; color: var(--text2); }
  .col-count { font-size: 10px; color: var(--text3); }
  .col-bar { height: 3px; border-radius: 2px; margin-bottom: 8px; opacity: 0.5; }
  .col-cards { display: flex; flex-direction: column; gap: 6px; }
  .deal-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px; cursor: pointer; transition: border-color 0.15s; }
  .deal-card:hover { border-color: var(--border2); }
  .deal-card-company { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
  .deal-card-contact { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
  .deal-card-bottom { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .deal-card-value { font-size: 11px; font-weight: 500; }
  .risk-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 500; }
  .bant-bar-wrap { margin-top: 5px; }
  .bant-bar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .bant-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .bant-score-label { font-size: 10px; color: var(--text3); margin-top: 2px; display: flex; justify-content: space-between; }
  .idle-warn { font-size: 10px; color: #E24B4A; margin-top: 4px; }
  .empty-col { font-size: 11px; color: var(--text3); padding: 10px; text-align: center; background: var(--bg2); border-radius: var(--radius); }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
  .card + .card { margin-top: 10px; }
  .card-title { font-size: 13px; font-weight: 500; margin-bottom: 12px; }

  .deal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .deal-name { font-size: 16px; font-weight: 500; }
  .deal-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field-label { font-size: 11px; color: var(--text2); }
  .activity-last { font-size: 12px; padding: 8px 10px; background: var(--bg2); border-radius: var(--radius); margin-bottom: 10px; color: var(--text2); line-height: 1.5; }
  .activity-input { display: flex; gap: 6px; }

  .agent-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); cursor: pointer; margin-bottom: 7px; text-align: left; font-family: inherit; color: var(--text); transition: background 0.15s; }

  .agent-output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .agent-output-name { font-size: 12px; font-weight: 500; color: var(--purple); }
  .agent-output-text { font-size: 12px; line-height: 1.7; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
  .agent-saved-note { font-size: 11px; color: var(--green-text); background: var(--green-bg); padding: 4px 10px; border-radius: 4px; margin-top: 8px; }
  .list-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .list-table th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text2); border-bottom: 0.5px solid var(--border); }
  .list-table td { padding: 8px 12px; border-bottom: 0.5px solid var(--border); }
  .list-table tr:last-child td { border-bottom: none; }
  .list-table tbody tr { cursor: pointer; transition: background 0.1s; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .error-bar { font-size: 12px; color: #E24B4A; padding: 8px 12px; background: var(--red-bg); border-radius: var(--radius); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .saving { font-size: 11px; color: var(--text3); }
  .hint { font-size: 11px; color: var(--text3); margin-top: 6px; }
  textarea { height: 60px; resize: vertical; }
  .bant-section { margin-bottom: 10px; }
  .bant-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .bant-total { display: flex; align-items: center; gap: 8px; }
  .bant-total-score { font-size: 22px; font-weight: 500; }
  .bant-total-label { font-size: 11px; color: var(--text2); line-height: 1.3; }
  .bant-row { display: grid; grid-template-columns: 90px 1fr 180px; gap: 8px; align-items: start; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border); }
  .bant-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .bant-letter { display: flex; align-items: center; gap: 6px; }
  .bant-letter-badge { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
  .bant-letter-name { font-size: 12px; font-weight: 500; }
  .bant-dots { display: flex; gap: 4px; align-items: center; margin-top: 2px; }
  .bant-dot { width: 20px; height: 20px; border-radius: 4px; border: 0.5px solid var(--border2); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; }
  .bant-score-wrap { display: flex; flex-direction: column; gap: 4px; }
  .close-date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
  .weighted-value { font-size: 13px; font-weight: 500; color: var(--purple); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading { display: flex; align-items: center; gap: 10px; padding: 40px; justify-content: center; color: var(--text2); font-size: 13px; }
  /* Quick-run modal overlay */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); padding: 20px; width: 100%; max-width: 560px; border: 0.5px solid var(--border2); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .modal-title { font-size: 14px; font-weight: 500; }
  .modal-company { font-size: 12px; color: var(--purple); font-weight: 500; margin-bottom: 10px; }
  .modal-output { font-size: 12px; line-height: 1.75; white-space: pre-wrap; max-height: 420px; overflow-y: auto; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; background: var(--bg2); }
  .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<div id="modal-root"></div>
<script>
const PROXY = "https://mycena-crm-proxy.julia-aa4.workers.dev";

const STAGES = [
  { id:"Identified", color:"#888780" },
  { id:"Contacted", color:"#7F77DD" },
  { id:"Engaged", color:"#378ADD" },
  { id:"Assessment booked", color:"#EF9F27" },
  { id:"Assessment delivered", color:"#D85A30" },
  { id:"Internal selling", color:"#D4537E" },
  { id:"Commercial", color:"#639922" },
  { id:"Closed won", color:"#1D9E75" },
  { id:"Closed lost", color:"#E24B4A" },
  { id:"Nurture", color:"#B4B2A9" },
];
const PIPE_STAGES = STAGES.filter(s => !["Closed won","Closed lost","Nurture"].includes(s.id));
const SECTORS = ["Financial services","Critical infrastructure","Healthcare","Government/Defence","Retail","Manufacturing","Professional services","Logistics","Technology","Other"];
const HEADBANDS = ["<500","500–2k","2k–10k","10k+"];
const LADDERS = ["1 — Out of control","2 — Aware but undefended","3 — Partial control","4 — Full control"];
const RISKS = ["GREEN","AMBER","RED"];
const SOURCES = ["Outbound-email","LinkedIn-ad","Inbound","Referral","Roundtable","Event"];
const TIERS = ["1","2","3"];

const BANT = [
  { key:"budget",    label:"Budget",    color:"#7F77DD", bg:"#EEEDFE", desc:"Has confirmed budget or budget process" },
  { key:"authority", label:"Authority", color:"#378ADD", bg:"#E6F1FB", desc:"Decision-maker or clear path to them" },
  { key:"need",      label:"Need",      color:"#1D9E75", bg:"#E1F5EE", desc:"Problem is confirmed and urgent" },
  { key:"timeline",  label:"Timeline",  color:"#EF9F27", bg:"#FAEEDA", desc:"Clear timeframe to purchase" },
];
const SCORE_LABELS = ["Unknown","Weak","Moderate","Confirmed"];
const SCORE_COLORS = ["#B4B2A9","#E24B4A","#EF9F27","#1D9E75"];

const bantTotal = d => (d.bant_budget_score||0)+(d.bant_authority_score||0)+(d.bant_need_score||0)+(d.bant_timeline_score||0);
const bantPct   = d => Math.round((bantTotal(d)/12)*100);
const bantColor = pct => pct >= 75 ? "#1D9E75" : pct >= 40 ? "#EF9F27" : "#E24B4A";
const weightedValue = d => Math.round((d.deal_value||0) * (bantPct(d)/100));

const riskBg  = r => r==="GREEN"?"var(--green-bg)":r==="AMBER"?"var(--amber-bg)":"var(--red-bg)";
const riskTxt = r => r==="GREEN"?"var(--green-text)":r==="AMBER"?"var(--amber-text)":"var(--red-text)";
const fmt = n => (n!=null&&n!=="") ? "£"+(n>=1e6?(n/1e6).toFixed(1)+"M":n>=1000?(n/1000).toFixed(0)+"k":n) : "—";
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

const SESSION_KEY = "mc_session";
function getSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch { return null; } }
function setSession(s) { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
function clearSession() { localStorage.removeItem(SESSION_KEY); }

// Load API key from localStorage on startup
window.ANTHROPIC_KEY = localStorage.getItem("mc_anthropic_key") || "";

let state = {
  session: getSession(),
  authEmail:"", authPassword:"", authError:"", authLoading:false,
  deals:[], view:"pipeline", activeDeal:null, showNew:false,
  search:"", error:"", saving:false,
  agentRunning:null, agentOutput:null, newActivity:"",
  newDeal: blankDeal(),
  // Quick-run modal
  modal: null, // { deal, running, output, saved }
};

function blankDeal() {
  return { company:"", contact_name:"", title:"IT Manager", sector:"Financial services", headcount:"500–2k", stage:"Identified", control_ladder:"1 — Out of control", risk:"GREEN", deal_value:"", exposure_figure:"", icp_tier:"1", source:"Outbound-email", days_since_activity:0, last_activity:"Deal created", notes:"", bant_budget_score:0, bant_budget_notes:"", bant_authority_score:0, bant_authority_notes:"", bant_need_score:0, bant_need_notes:"", bant_timeline_score:0, bant_timeline_notes:"", expected_close_date:"", close_quarter:"" };
}

// ── Agent 08 full prompt ──────────────────────────────────────────────────────
function buildAgent08Prompt(d) {
  const bScore = bantTotal(d);
  const bantBreakdown = `Budget:${d.bant_budget_score||0} Authority:${d.bant_authority_score||0} Need:${d.bant_need_score||0} Timeline:${d.bant_timeline_score||0}`;
  const bantNotes = [
    d.bant_budget_notes   ? `Budget notes: ${d.bant_budget_notes}`   : "",
    d.bant_authority_notes? `Authority notes: ${d.bant_authority_notes}` : "",
    d.bant_need_notes     ? `Need notes: ${d.bant_need_notes}`         : "",
    d.bant_timeline_notes ? `Timeline notes: ${d.bant_timeline_notes}` : "",
  ].filter(Boolean).join("\n");

  return `You are MyCena Sales Research Agent 08. MyCena helps BPOs eliminate password-related IT support costs through zero-knowledge access management — agents never see or handle passwords, which slashes helpdesk ticket volume, reduces onboarding/offboarding friction, and removes shared credential risk across shifts.

Your job: research this BPO prospect and write a personalised first-touch outreach message. Work through each section below.

━━━ PROSPECT INPUTS ━━━
Company: ${d.company}
Contact: ${d.contact_name}, ${d.title}
Sector: ${d.sector}
Headcount: ${d.headcount}
Region/source: ${d.source||"unknown"}
Control Ladder: ${d.control_ladder}
BANT Score: ${bScore}/12 (${bantBreakdown})
${bantNotes ? bantNotes + "\n" : ""}Existing notes: ${d.notes||"none"}

━━━ SECTION 2 — COMPANY RESEARCH ━━━
Based on what you know about ${d.company}, provide:
- What this BPO likely does (niche, client types)
- Estimated agent/seat count given headcount band: ${d.headcount}
- Likely tech stack signals for a BPO this size
- Compliance exposure likely for their sector/region (e.g. PCI-DSS, POPIA, GDPR)
- Any notable growth signals or market context

━━━ SECTION 3 — PERSONA ASSESSMENT ━━━
For a ${d.title} at a BPO of this size:
- What do they own day-to-day (helpdesk, infrastructure, ops)?
- What are their most likely password/access pain points?
- What objection are they most likely to raise about a new access tool?

━━━ SECTION 4 — MYCENA FIT ━━━
Score this prospect 1–3 on each signal and give a priority rating:
- Headcount / seat volume
- Compliance pressure
- Control Ladder position (${d.control_ladder})
- BANT readiness (${bScore}/12)
Recommended priority: Hot / Warm / Nurture — and why in one sentence.

━━━ SECTION 5 — OUTREACH MESSAGE ━━━
Write a LinkedIn DM (under 120 words). Rules:
1. Open with something specific to ${d.company} or their sector — not a generic opener
2. Name one pain a ${d.title} at a BPO typically feels around IT support costs or password resets
3. Connect it to MyCena in one sentence — no jargon, no feature list
4. Close with: "Worth a 15-min call this week?"
Tone: peer-to-peer, direct, calm authority. No fluff.

Format your response with clear section headers (Section 2, Section 3, etc.) so it's easy to scan.`;
}

// ── Auth & DB ─────────────────────────────────────────────────────────────────
async function authFetch(body) {
  const res = await fetch(`${PROXY}/auth/token`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || "Invalid email or password");
  return data;
}

async function db(path, opts={}) {
  const token = state.session?.access_token;
  const res = await fetch(`${PROXY}/${path}`, {
    headers: { "Content-Type":"application/json", "Prefer":opts.prefer||"return=representation", ...(token?{"X-Auth-Token":token}:{}) },
    ...opts,
  });
  if (!res.ok) {
    if (res.status===401) { signOut(); return; }
    const e = await res.json().catch(()=>({}));
    throw new Error(e.message||"Request failed");
  }
  if (res.status===204) return null;
  return res.json();
}

async function signIn() {
  state.authLoading=true; state.authError=""; render();
  try {
    const data = await authFetch({ email:state.authEmail, password:state.authPassword });
    setSession(data); state.session=data; state.authLoading=false;
    await load();
  } catch(e) { state.authError=e.message; state.authLoading=false; render(); }
}

function signOut() { clearSession(); state.session=null; state.deals=[]; state.activeDeal=null; render(); }

async function load() {
  try {
    const data = await db("deals?order=created_at.desc&limit=500", { prefer:"" });
    state.deals=data||[]; state.error="";
  } catch(e) { state.error=e.message; }
  render();
}

async function saveDeal(id, fields) {
  state.saving=true; render();
  try {

// ── Agent runners ─────────────────────────────────────────────────────────────
async function callClaude(prompt) {
  const key = window.ANTHROPIC_KEY;
  if (!key) throw new Error("No API key. Click '⚠ Add API key' in the header.");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1500, messages:[{role:"user",content:prompt}] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message||"API error");
  return data.content?.[0]?.text || "No output.";
}

// ── Batch Agent 08 ────────────────────────────────────────────────────────────
let batchState = null; // { total, done, current, errors, running }

async function runAgent08Batch() {
  const deals = state.deals.filter(d => !["Closed won","Closed lost"].includes(d.stage) && !(d.notes||"").startsWith("[Agent 08 —"));
  if (!deals.length) return;
  batchState = { total: deals.length, done: 0, current: null, errors: [], running: true };
  renderBatchModal();

  for (const deal of deals) {
    if (!batchState.running) break;
    batchState.current = deal.company;
    renderBatchModal();
    try {
      const text = await callClaude(buildAgent08Prompt(deal));
      const ts = new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
      const newNotes = `[Agent 08 — ${ts}]\n${text}`;
      await saveDeal(deal.id, { notes: newNotes });
    } catch(e) {
      batchState.errors.push(`${deal.company}: ${e.message}`);
    }
    batchState.done++;
    renderBatchModal();
    // 1.5s delay between calls
    if (batchState.done < deals.length) await new Promise(r => setTimeout(r, 1500));
  }
  batchState.running = false;
  batchState.current = null;
  renderBatchModal();
}

function stopBatch() { if (batchState) batchState.running = false; }
function closeBatchModal() { batchState = null; render(); }

function renderBatchModal() {
  const mr = document.getElementById("modal-root");
  if (!batchState) { render(); return; }
  const { total, done, current, errors, running } = batchState;
  const pct = Math.round((done / total) * 100);
  const finished = !running && current === null;
  mr.innerHTML = `
    <div class="modal-overlay">
      <div class="modal" style="max-width:480px">
        <div class="modal-header">
          <span class="modal-title">Agent 08 — Batch run</span>
          ${finished ? `<button class="btn btn-sm" onclick="closeBatchModal()">✕</button>` : ""}
        </div>
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px">
            <span>${finished ? "Complete" : current ? `Researching ${esc(current)}...` : "Starting..."}</span>
            <span>${done} / ${total}</span>
          </div>
          <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:var(--purple);border-radius:3px;transition:width 0.4s"></div>
          </div>
        </div>
        ${errors.length ? `<div style="font-size:11px;color:#E24B4A;background:var(--red-bg);padding:8px 10px;border-radius:var(--radius);margin-bottom:10px">${errors.map(e=>esc(e)).join("<br>")}</div>` : ""}
        ${finished
          ? `<div class="agent-saved-note" style="margin-bottom:12px">✓ ${done - errors.length} briefs saved to notes</div>
             <button class="btn btn-primary" onclick="closeBatchModal()">Done</button>`
          : `<button class="btn" onclick="stopBatch()">Stop</button>`}
      </div>
    </div>`;
}

// Agent runner for deal detail panel (08 + 09 + 10)
async function runAgent(name, deal) {
  state.agentRunning=name; state.agentOutput=null; render();
  const bScore = bantTotal(deal);
  let prompt;
  if (name === "Research brief") {
    prompt = buildAgent08Prompt(deal);
  } else if (name === "Follow-up email") {
    prompt = `You are MyCena Post-Call Follow-Up Agent 09. Follow-up email:\nCompany: ${deal.company}\nContact: ${deal.contact_name}, ${deal.title}\nStage: ${deal.stage}\nExposure: ${deal.exposure_figure?fmt(deal.exposure_figure):"not yet calculated"}\nBANT: ${bScore}/12\nExpected close: ${deal.close_quarter||deal.expected_close_date||"not set"}\nLast activity: ${deal.last_activity||""}\nNotes: ${deal.notes||""}\n\nPersonalised follow-up under 200 words. Reference something specific. State next step clearly. Calm authority tone.`;
  } else {
    prompt = `You are MyCena Deal Intelligence Agent 10. Diagnose:\nCompany: ${deal.company}\nStage: ${deal.stage}\nRisk: ${deal.risk}\nBANT Score: ${bScore}/12 (Budget:${deal.bant_budget_score||0} Authority:${deal.bant_authority_score||0} Need:${deal.bant_need_score||0} Timeline:${deal.bant_timeline_score||0})\nExpected close: ${deal.close_quarter||deal.expected_close_date||"not set"}\nDays since activity: ${deal.days_since_activity||0}\nLast: ${deal.last_activity||""}\nNotes: ${deal.notes||""}\n\n1) Why this deal is at risk\n2) Weakest BANT letter and what to do about it\n3) One specific re-engagement action with opening line.`;
  }
  try {
    const text = await callClaude(prompt);
    state.agentOutput = { name, text };
    // Auto-save Agent 08 output to notes
    if (name === "Research brief") {
      const ts = new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
      const newNotes = `[Agent 08 — ${ts}]\n${text}`;
      await saveDeal(deal.id, { notes: newNotes });
      state.agentOutput.savedToNotes = true;
    }
  } catch(e) { state.agentOutput={ name, text:`Agent unavailable: ${e.message}` }; }
  state.agentRunning=null; render();
}

// ── Metrics ───────────────────────────────────────────────────────────────────
function metrics() {
  const active = state.deals.filter(d=>!["Closed won","Closed lost","Nurture"].includes(d.stage));
  return {
    active: active.length,
    pipeline: active.reduce((s,d)=>s+(d.deal_value||0),0),
    weighted: active.reduce((s,d)=>s+weightedValue(d),0),
    won: state.deals.filter(d=>d.stage==="Closed won").reduce((s,d)=>s+(d.deal_value||0),0),
    assessments: state.deals.filter(d=>["Assessment booked","Assessment delivered"].includes(d.stage)).length,
    atRisk: state.deals.filter(d=>d.risk==="RED"||(d.risk==="AMBER"&&(d.days_since_activity||0)>10)).length,
  };
}

function filtered() {
  if(!state.search) return state.deals;
  const q=state.search.toLowerCase();
  return state.deals.filter(d=>d.company?.toLowerCase().includes(q)||d.contact_name?.toLowerCase().includes(q));
}

function sel() { return state.activeDeal?state.deals.find(d=>d.id===state.activeDeal):null; }
function selectOpts(arr,val) { return arr.map(o=>`<option value="${esc(o)}" ${o===val?"selected":""}>${esc(o)}</option>`).join(""); }

function bantScoreDots(deal, key) {
  const cur = deal[`bant_${key}_score`]||0;

  }).join("");
}

    main = `
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input type="text" style="width:220px" placeholder="Search..." value="${esc(state.search)}" oninput="setSearch(this.value)">
      </div>
      <div class="pipeline"><div class="pipeline-inner">
        ${PIPE_STAGES.map(stage=>{
          const sd=filtered().filter(d=>d.stage===stage.id);
          const val=sd.reduce((s,d)=>s+(d.deal_value||0),0);
          return `
            <div class="column">
              <div class="col-header"><span class="col-title">${stage.id}</span><span class="col-count">${sd.length} · ${fmt(val)}</span></div>
              <div class="col-bar" style="background:${stage.color}"></div>
              <div class="col-cards">
                ${sd.length===0?'<div class="empty-col">Empty</div>':sd.map(d=>{
                  const pct=bantPct(d), bc=bantColor(pct);
                  return `
                    <div class="deal-card" onclick="openDeal('${d.id}')">
                      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px">
                        <div class="deal-card-company">${esc(d.company)}</div>
                        <button class="btn-agent08" onclick="quickRunAgent08('${d.id}',event)" ${state.modal?.running?"disabled":""}>08 ▶</button>
                      </div>
                      <div class="deal-card-contact">${esc(d.contact_name)}</div>
                      <div class="deal-card-bottom">
                        <span class="deal-card-value">${fmt(d.deal_value)}</span>
                        <span class="risk-badge" style="background:${riskBg(d.risk)};color:${riskTxt(d.risk)}">${d.risk}</span>
                      </div>
                      <div class="bant-bar-wrap">
                        <div class="bant-bar-track"><div class="bant-bar-fill" style="width:${pct}%;background:${bc}"></div></div>
                        <div class="bant-score-label"><span>BANT ${bantTotal(d)}/12</span><span style="color:${bc}">${pct}%</span></div>
                      </div>
                      ${d.close_quarter?`<div style="font-size:10px;color:var(--text3);margin-top:3px">${esc(d.close_quarter)}</div>`:""}
                      ${(d.days_since_activity||0)>10?`<div class="idle-warn">${d.days_since_activity}d no activity</div>`:""}
                    </div>`;
                }).join("")}
              </div>
            </div>`;
        }).join("")}
      </div></div>`;

  } else {
    main = `
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input type="text" style="width:220px" placeholder="Search..." value="${esc(state.search)}" oninput="setSearch(this.value)">
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <table class="list-table">
          <thead><tr>${["Company","Contact","Stage","BANT","Weighted value","Close","Risk","Days idle","Agent 08"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
          <tbody>
            ${filtered().map(d=>{
              const pct=bantPct(d), bc=bantColor(pct);
              return `
                <tr onclick="openDeal('${d.id}')">
                  <td><strong>${esc(d.company)}</strong></td>
                  <td style="color:var(--text2)">${esc(d.contact_name)}</td>
                  <td><span class="stage-pill">${esc(d.stage)}</span></td>
                  <td><div style="display:flex;align-items:center;gap:6px"><div style="width:48px;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${bc};border-radius:2px"></div></div><span style="font-size:11px;color:${bc};font-weight:500">${bantTotal(d)}/12</span></div></td>
                  <td style="font-weight:500;color:var(--purple)">${fmt(weightedValue(d))}</td>
                  <td style="color:var(--text2)">${esc(d.close_quarter||"—")}</td>
                  <td><span class="risk-badge" style="background:${riskBg(d.risk)};color:${riskTxt(d.risk)}">${d.risk}</span></td>
                  <td style="color:${(d.days_since_activity||0)>10?"#E24B4A":"var(--text2)"}">${d.days_since_activity||0}d</td>
                  <td onclick="event.stopPropagation()"><button class="btn-agent08" onclick="quickRunAgent08('${d.id}',event)">08 ▶</button></td>
                </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>`;
  }

  root.innerHTML = `<div class="app">${header}${metricsHtml}${errorHtml}${newDealForm}${main}</div>`;
}

function promptApiKey() {
  const k = prompt("Enter your Anthropic API key (sk-ant-...):\n\nStored only in your browser's localStorage — sent directly to Anthropic's API only.", window.ANTHROPIC_KEY||"");
  if (k !== null) { window.ANTHROPIC_KEY=k.trim(); localStorage.setItem("mc_anthropic_key",k.trim()); render(); }
}
function setView(v) { state.view=v; render(); }
function toggleNew() { state.showNew=!state.showNew; render(); }
function clearError() { state.error=""; render(); }
function clearAgent() { state.agentOutput=null; render(); }
function setSearch(v) { state.search=v; render(); }
function openDeal(id) { state.activeDeal=id; state.agentOutput=null; render(); }
function goBack() { state.activeDeal=null; state.agentOutput=null; render(); }
function updateNew(f,v) { state.newDeal[f]=v; }
function setBant(id,field,val) { saveDeal(id,{[field]:val}); }

if (state.session) { load(); } else { render(); }
</script>
</body>
</html>
