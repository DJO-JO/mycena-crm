<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCena — LinkedIn Outreach</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede8;
    --text: #1a1a18; --text2: #6b6b66; --text3: #9b9b96;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --purple: #7F77DD; --purple-bg: #EEEDFE; --purple-text: #26215C;
    --green: #1D9E75; --green-bg: #E1F5EE; --green-text: #04342C;
    --amber-bg: #FAEEDA; --amber-text: #412402;
    --red-bg: #FCEBEB; --red-text: #501313;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #242422; --bg3: #2c2c2a;
      --text: #e8e6de; --text2: #9b9996; --text3: #6b6b66;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --purple-bg: #26215C; --purple-text: #CECBF6;
      --green-bg: #04342C; --green-text: #9FE1CB;
      --amber-bg: #412402; --amber-text: #FAC775;
      --red-bg: #501313; --red-text: #F09595;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg3); color: var(--text); font-size: 14px; min-height: 100vh; }
  .app { max-width: 960px; margin: 0 auto; padding: 20px; }

  .header { display:flex; align-items:center; justify-content:space-between; background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:14px 18px; margin-bottom:14px; }
  .logo { width:28px; height:28px; border-radius:7px; background:var(--green); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .badge { font-size:11px; padding:2px 8px; border-radius:4px; background:var(--green-bg); color:var(--green-text); font-weight:500; }

  .tabs { display:flex; gap:6px; }
  .tab { font-size:12px; padding:6px 14px; border-radius:var(--radius); border:0.5px solid var(--border2); background:var(--bg2); color:var(--text); cursor:pointer; font-family:inherit; transition:background 0.15s; }
  .tab.active { background:var(--green); color:white; border-color:var(--green); }

  .metrics { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:14px; }
  .metric { background:var(--bg2); border-radius:var(--radius); padding:10px 12px; cursor:pointer; transition:background 0.15s; }
  .metric:hover { background:var(--bg3); }
  .metric.active { background:var(--green-bg); }
  .metric-label { font-size:11px; color:var(--text2); margin-bottom:3px; }
  .metric-value { font-size:22px; font-weight:500; }

  .card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:16px; margin-bottom:10px; }
  .bar { display:flex; align-items:center; gap:10px; background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:12px 14px; margin-bottom:14px; }
  .progress-track { flex:1; height:4px; background:var(--bg3); border-radius:2px; }
  .progress-fill { height:100%; border-radius:2px; transition:width 0.3s; }

  .toolbar { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
  input[type=text], input[type=file], select, textarea {
    font-size:13px; padding:7px 10px; border-radius:var(--radius); border:0.5px solid var(--border2);
    background:var(--bg); color:var(--text); font-family:inherit; width:100%;
  }
  input[type=text]:focus, select:focus, textarea:focus { outline:2px solid var(--purple); outline-offset:1px; }
  input[type=file] { padding:6px 8px; cursor:pointer; }
  .search { width:220px; }

  .btn { font-size:12px; padding:7px 14px; border-radius:var(--radius); border:0.5px solid var(--border2); background:var(--bg2); color:var(--text); cursor:pointer; font-family:inherit; transition:background 0.15s; white-space:nowrap; }
  .btn:hover { background:var(--bg3); }
  .btn-primary { background:var(--green); color:white; border-color:var(--green); }
  .btn-purple { background:var(--purple); color:white; border-color:var(--purple); }
  .btn-blue { background:#0A66C2; color:white; border-color:#0A66C2; }
  .btn-crm { background:#639922; color:white; border-color:#639922; }
  .btn-sm { font-size:11px; padding:3px 9px; border-radius:5px; }
  .btn:disabled { opacity:0.6; cursor:wait; }

  .contact-row { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); margin-bottom:8px; overflow:hidden; }
  .contact-row.open { border-color:var(--green); }
  .contact-header { display:flex; align-items:center; gap:10px; padding:11px 14px; cursor:pointer; }
  .contact-header:hover { background:var(--bg2); }
  .tier-badge { font-size:11px; padding:2px 6px; border-radius:4px; font-weight:500; flex-shrink:0; }
  .contact-name { font-size:13px; font-weight:500; }
  .contact-sub { font-size:11px; color:var(--text2); }
  .tag { font-size:11px; padding:2px 6px; border-radius:4px; background:var(--bg2); color:var(--text2); white-space:nowrap; }
  .status-pill { font-size:11px; padding:2px 7px; border-radius:4px; font-weight:500; white-space:nowrap; }
  .mini-badge { font-size:10px; padding:1px 5px; border-radius:3px; }

  .contact-body { border-top:0.5px solid var(--border); padding:14px; }
  .status-row { margin-bottom:14px; }
  .status-btns { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .status-btn { font-size:11px; padding:4px 10px; border-radius:5px; border:0.5px solid var(--border2); cursor:pointer; font-family:inherit; background:var(--bg2); color:var(--text2); transition:background 0.15s; }
  .status-btn.active { font-weight:500; }

  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .section-title { font-size:12px; font-weight:500; color:var(--text2); margin-bottom:8px; }
  .brief-text { font-size:12px; line-height:1.7; white-space:pre-wrap; }
  .note-box { font-size:13px; line-height:1.7; padding:10px; background:var(--bg2); border-radius:var(--radius); margin-bottom:6px; }
  .char-count { font-size:11px; color:var(--text3); margin-bottom:8px; }
  .char-count.over { color:#E24B4A; }

  .promote-bar { margin-top:14px; padding-top:12px; border-top:0.5px solid var(--border); }
  .promote-hint { font-size:11px; color:var(--text3); text-align:center; margin-top:4px; }
  .in-crm { margin-top:12px; font-size:12px; padding:8px 12px; border-radius:var(--radius); background:#EAF3DE; color:#27500A; }

  .empty { font-size:13px; color:var(--text3); padding:40px; text-align:center; }
  .alert { font-size:12px; padding:8px 12px; border-radius:var(--radius); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .alert-green { background:var(--green-bg); color:var(--green-text); border-left:3px solid var(--green); }
  .alert-amber { background:var(--amber-bg); color:var(--amber-text); border-left:3px solid #EF9F27; }

  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.4); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; margin-right:6px; vertical-align:middle; }
  .spinner-dark { border-color:rgba(0,0,0,0.1); border-top-color:var(--text2); }
  @keyframes spin { to { transform:rotate(360deg); } }

  .toast { position:fixed; bottom:20px; right:20px; background:#1D9E75; color:white; font-size:12px; padding:8px 14px; border-radius:var(--radius); font-family:inherit; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:999; }
  .toast.show { opacity:1; }

  @media (max-width:600px) {
    .metrics { grid-template-columns:repeat(3,1fr); }
    .two-col { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="empty"><span class="spinner spinner-dark"></span> Loading...</div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE = "https://mycena-crm-proxy.julia-aa4.workers.dev";
const PROXY    = "https://mycena-crm-proxy.julia-aa4.workers.dev/anthropic";

const STATUS_FLOW  = ["Not sent","Note sent","Connected","Replied","Booked","Irrelevant"];
const STATUS_STYLE = {
  "Not sent":    {bg:"var(--bg2)",        text:"var(--text3)"},
  "Note sent":   {bg:"var(--purple-bg)",  text:"var(--purple-text)"},
  "Connected":   {bg:"#E6F1FB",           text:"#042C53"},
  "Replied":     {bg:"var(--amber-bg)",   text:"var(--amber-text)"},
  "Booked":      {bg:"var(--green-bg)",   text:"var(--green-text)"},
  "Irrelevant":  {bg:"var(--bg3)",        text:"var(--text3)"},
};
const SECTOR_MAP = {
  "financial services":"Financial services","banking":"Financial services","insurance":"Financial services",
  "bpo":"BPO","business process outsourcing":"BPO","outsourcing":"BPO",
  "msp":"MSP","managed service":"MSP","it services":"MSP",
  "healthcare":"Healthcare","hospital":"Healthcare","medical":"Healthcare",
  "government":"Government/Defence","defence":"Government/Defence","defense":"Government/Defence","public sector":"Government/Defence",
  "retail":"Retail","ecommerce":"Retail","manufacturing":"Manufacturing","industrial":"Manufacturing",
  "logistics":"Logistics","supply chain":"Logistics","professional services":"Professional services",
  "consulting":"Professional services","technology":"Technology","software":"Technology","saas":"Technology",
  "critical infrastructure":"Critical infrastructure","energy":"Critical infrastructure","utilities":"Critical infrastructure",
};
const ICP_TITLES = ["ciso","chief information security officer","vp information security","director information security","head of cybersecurity","head of information security","vp it","cto","chief technology officer","it director","it manager","head of it","risk","compliance"];

const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const mapSector = ind => { const l=(ind||"").toLowerCase(); for(const[k,v]of Object.entries(SECTOR_MAP)){if(l.includes(k))return v;} return "Other"; };
const mapHC = n => !n?"500–2k":n<500?"<500":n<2000?"500–2k":n<10000?"2k–10k":"10k+";
const icpScore = r => {
  let s=0;
  const t=(r["Title"]||"").toLowerCase();
  if(ICP_TITLES.some(x=>t.includes(x)))s+=3;
  const sec=mapSector(r["Industry"]||"");
  if(["Financial services","BPO","MSP","Critical infrastructure","Healthcare","Government/Defence"].includes(sec))s+=2;
  const e=parseInt(r["# Employees"])||0;
  if(e>=500&&e<10000)s+=1;
  if(r["Person Linkedin Url"])s+=1;
  return s;
};

let state = {
  view:"import", contacts:[], parsed:[], search:"", filterTier:"All", filterStatus:"All",
  showIrrelevant:false,
  expanded:null, phase:"", progress:0, importing:false, imported:false,
  importedCount:0, skippedCount:0, batchRunning:false, batchDone:0, batchTotal:0, batchCurrent:"",
  loadingId:null, copiedId:null,
};

// ── API helpers ──────────────────────────────────────────────────────────────
async function supabase(path, opts={}) {
  const res = await fetch(`${SUPABASE}/${path}`, {
    method: opts.method||"GET",
    headers: { "Content-Type":"application/json", "Prefer": opts.prefer!==undefined?opts.prefer:"return=representation" },
    body: opts.body,
  });
  if (res.status===204) return null;
  const data = await res.json();
  return data;
}

async function claude(prompt, system) {
  const body = { model:"claude-sonnet-4-20250514", max_tokens:600, messages:[{role:"user",content:prompt}] };
  if (system) body.system = system;
  const res = await fetch(PROXY, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
  const data = await res.json();
  return data.content?.[0]?.text||"";
}

function toast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

// ── load contacts from Supabase ──────────────────────────────────────────────
async function loadContacts() {
  state.phase="Loading contacts..."; render();
  try {
    const data = await supabase("contacts?order=icp_score.desc,created_at.desc&limit=2000", {prefer:""});
    state.contacts = Array.isArray(data) ? data : [];
  } catch(e) { state.contacts=[]; }
  state.phase=""; render();
}

// ── parse CSV ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines=text.split("\n").filter(l=>l.trim());
  const headers=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur="";let inQ=false;
    for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===","&&!inQ){vals.push(cur.trim());cur="";}else cur+=ch;}
    vals.push(cur.trim());
    const row={};
    headers.forEach((h,i)=>{row[h]=(vals[i]||"").replace(/^"|"$/g,"");});
    return row;
  }).filter(r=>r["First Name"]||r["Last Name"]);
}

function onFile(e) {
  const file=e.target.files?.[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const rows=parseCSV(ev.target.result);
    const score_val = r => icpScore(r);
    state.parsed = rows.map((r,i)=>{
      const sc=icpScore(r);
      return {
        _pid:i, first_name:r["First Name"]||"", last_name:r["Last Name"]||"",
        contact_name:`${r["First Name"]||""} ${r["Last Name"]||""}`.trim(),
        title:r["Title"]||"", company:r["Company Name"]||"",
        sector:mapSector(r["Industry"]||""), headcount:mapHC(parseInt(r["# Employees"])||0),
        linkedin_url:r["Person Linkedin Url"]||"", email:r["Email"]||"",
        country:r["Country"]||"", industry_raw:r["Industry"]||"",
        keywords:r["Keywords"]||"", icp_tier:sc>=5?"1":sc>=3?"2":"3",
        icp_score:sc, source:"Apollo", outreach_status:"Not sent",
        agent08_brief:"", linkedin_note:"", notes:"", supabase_id:null,
      };
    }).sort((a,b)=>b.icp_score-a.icp_score);
    state.imported=false; render();
  };
  reader.readAsText(file);
}

// ── import to Supabase ───────────────────────────────────────────────────────
async function importContacts() {
  state.importing=true; state.phase="Checking existing contacts..."; state.progress=0; render();
  let existing=[];
  try { existing=await supabase("contacts?select=id,company,contact_name&limit=2000",{prefer:""})||[]; } catch(e){}
  const existingMap={};
  existing.forEach(d=>{
    const k=`${(d.company||"").toLowerCase().trim()}|${(d.contact_name||"").toLowerCase().trim()}`;
    existingMap[k]=d.id;
  });
  let newCount=0,linkedCount=0;
  const updated=[...state.parsed];
  state.phase="Importing..."; render();
  for(let i=0;i<updated.length;i++){
    const c=updated[i];
    const k=`${c.company.toLowerCase().trim()}|${c.contact_name.toLowerCase().trim()}`;
    if(existingMap[k]){
      updated[i]={...c,supabase_id:existingMap[k]};
      linkedCount++;
    } else {
      try {
        const data=await supabase("contacts",{
          method:"POST",
          body:JSON.stringify({
            first_name:c.first_name,last_name:c.last_name,contact_name:c.contact_name,
            title:c.title,company:c.company,sector:c.sector,headcount:c.headcount,
            linkedin_url:c.linkedin_url,email:c.email,country:c.country,
            industry_raw:c.industry_raw,keywords:c.keywords,
            icp_tier:c.icp_tier,icp_score:c.icp_score,source:c.source,
            outreach_status:"Not sent",notes:"",
          })
        });
        if(data?.[0]?.id) updated[i]={...c,supabase_id:data[0].id};
        newCount++;
      } catch(e){}
    }
    state.progress=Math.round(((i+1)/updated.length)*100); render();
  }
  state.parsed=updated; state.importing=false; state.imported=true;
  state.importedCount=newCount; state.skippedCount=linkedCount;
  state.phase=""; render();
}

// ── save brief + note to contact ─────────────────────────────────────────────
async function saveBriefNote(sid, brief, note) {
  if(!sid) return;
  await supabase(`contacts?id=eq.${sid}`,{
    method:"PATCH", prefer:"return=minimal",
    body:JSON.stringify({agent08_brief:brief||"",linkedin_note:note||""})
  });
}

// ── update status ─────────────────────────────────────────────────────────────
async function updateStatus(sid, status) {
  const tsField={"Note sent":"note_sent_at","Connected":"connected_at","Replied":"replied_at","Booked":"booked_at"}[status];
  const patch={outreach_status:status};
  if(tsField) patch[tsField]=new Date().toISOString();
  await supabase(`contacts?id=eq.${sid}`,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify(patch)});
  state.contacts=state.contacts.map(c=>c.id===sid?{...c,...patch}:c);
  render();
}

// ── promote to CRM deal ───────────────────────────────────────────────────────
async function promoteToDeal(sid) {
  state.loadingId=`promote_${sid}`; render();
  const c=state.contacts.find(x=>x.id===sid); if(!c) return;
  try {
    const data=await supabase("deals",{
      method:"POST",
      body:JSON.stringify({
        company:c.company,contact_name:c.contact_name,title:c.title,
        sector:c.sector,headcount:c.headcount,stage:"Contacted",
        control_ladder:"2 — Aware but undefended",risk:"GREEN",deal_value:0,
        icp_tier:c.icp_tier,source:"Inbound",days_since_activity:0,
        last_activity:`Promoted from contacts — ${c.outreach_status}`,
        notes:[
          c.linkedin_url?`LinkedIn: ${c.linkedin_url}`:"",
          c.agent08_brief?`\n--- Agent 08 Brief ---\n${c.agent08_brief}`:"",
          c.notes?`\n--- Notes ---\n${c.notes}`:"",
        ].filter(Boolean).join("\n").trim(),
      })
    });
    const dealId=data?.[0]?.id;
    if(dealId) {
      await supabase(`contacts?id=eq.${sid}`,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({deal_id:dealId})});
      state.contacts=state.contacts.map(x=>x.id===sid?{...x,deal_id:dealId}:x);
      toast(`✓ ${c.contact_name} promoted to CRM`);
    }
  } catch(e){ toast("Promote failed — check connection"); }
  state.loadingId=null; render();
}

// ── Agent 08 ──────────────────────────────────────────────────────────────────
async function runAgent08(sid) {
  state.loadingId=`brief_${sid}`; render();
  const c=state.contacts.find(x=>x.id===sid); if(!c) return;
  const brief=await claude(`You are MyCena Sales Research Agent 08. Pre-outreach brief.
Company: ${c.company} | Sector: ${c.sector} | Contact: ${c.contact_name}, ${c.title}
Headcount: ${c.headcount} | Country: ${c.country} | Keywords: ${c.keywords||"none"}
Return: 1) Sector breach + relevance 2) Control Ladder position + why 3) Top objection + response 4) Why MyCena matters now 5) LinkedIn opening angle (under 30 words, no product name, specific). No jargon.`);
  state.contacts=state.contacts.map(x=>x.id===sid?{...x,agent08_brief:brief}:x);
  await saveBriefNote(sid,brief,c.linkedin_note||"");
  toast("Brief saved to contact");
  state.loadingId=null; render();
}

// ── LinkedIn note ─────────────────────────────────────────────────────────────
async function generateNote(sid) {
  state.loadingId=`note_${sid}`; render();
  const c=state.contacts.find(x=>x.id===sid); if(!c) return;
  const note=await claude(`LinkedIn connection note for MyCena founder.
Contact: ${c.contact_name}, ${c.title} at ${c.company} | Sector: ${c.sector} | Country: ${c.country}
Keywords: ${c.keywords||"none"}
${c.agent08_brief?`Brief:\n${c.agent08_brief}`:""}
Rules: STRICT 200 character maximum — count every character including spaces. Never name the product. Reference something specific and real about their company or sector. No deck/link/case study. One low-friction reason to connect. Peer-to-peer tone. Start with their first name. If your draft exceeds 200 characters, rewrite it shorter before responding.`,
    "Return only the LinkedIn note. No preamble, no labels, no quotes.");
  state.contacts=state.contacts.map(x=>x.id===sid?{...x,linkedin_note:note}:x);
  await saveBriefNote(sid,c.agent08_brief||"",note);
  toast("Note saved to contact");
  state.loadingId=null; render();
}

// ── batch run Tier 1 ──────────────────────────────────────────────────────────
async function runAllTier1() {
  const src = state.view==="import" ? state.parsed : state.contacts;
  const tier1 = src.filter(c=>c.icp_tier==="1"&&!c.agent08_brief&&!c.linkedin_note);
  if(!tier1.length){ toast("All Tier 1 contacts already briefed"); return; }
  state.batchRunning=true; state.batchDone=0; state.batchTotal=tier1.length; state.batchCurrent=""; render();
  for(let i=0;i<tier1.length;i++){
    const c=tier1[i];
    state.batchCurrent=`${c.contact_name} at ${c.company}`; state.batchDone=i; render();
    const brief=await claude(`MyCena Sales Research Agent 08.
Company: ${c.company} | Sector: ${c.sector} | Contact: ${c.contact_name}, ${c.title}
Headcount: ${c.headcount} | Country: ${c.country} | Keywords: ${c.keywords||"none"}
Return: 1) Sector breach 2) Control Ladder 3) Objection + response 4) Why MyCena now 5) LinkedIn angle. Specific, no jargon.`);
    const note=await claude(`LinkedIn connection note for MyCena founder.
Contact: ${c.contact_name}, ${c.title} at ${c.company} | Sector: ${c.sector}
Brief: ${brief}
Rules: STRICT 200 character maximum — count every character. No product name. Specific reference. No deck/link. Low-friction CTA. Peer-to-peer. Start with first name. Rewrite if over 200 chars.`,
      "Return only the note. No preamble.");
    const sid=c.id||c.supabase_id;
    if(state.view==="import"){
      state.parsed=state.parsed.map(x=>(x._pid===c._pid)?{...x,agent08_brief:brief,linkedin_note:note}:x);
    } else {
      state.contacts=state.contacts.map(x=>x.id===sid?{...x,agent08_brief:brief,linkedin_note:note}:x);
    }
    if(sid) await saveBriefNote(sid,brief,note);
    render();
  }
  state.batchDone=tier1.length; state.batchRunning=false; state.batchCurrent="";
  toast(`✓ ${tier1.length} Tier 1 contacts briefed`);
  render();
}

function copyNote(text) {
  navigator.clipboard?.writeText(text);
  toast("✓ Copied to clipboard");
}

// ── filtered contacts ─────────────────────────────────────────────────────────
function filtered() {
  const src = state.view==="import" ? state.parsed : state.contacts;
  const q=state.search.toLowerCase();
  return src.filter(c=>{
    const mQ=!q||c.contact_name?.toLowerCase().includes(q)||c.company?.toLowerCase().includes(q)||c.title?.toLowerCase().includes(q);
    const mT=state.filterTier==="All"||c.icp_tier===state.filterTier;
    const mS=state.filterStatus==="All"||(c.outreach_status||"Not sent")===state.filterStatus;
    const mI=state.showIrrelevant||(c.outreach_status||"Not sent")!=="Irrelevant";
    return mQ&&mT&&mS&&mI;
  });
}

// ── render helpers ────────────────────────────────────────────────────────────
function tierStyle(t) {
  return t==="1"?{bg:"#E1F5EE",text:"#1D9E75"}:t==="2"?{bg:"#FAEEDA",text:"#EF9F27"}:{bg:"#F1EFE8",text:"#888780"};
}

function renderContactCard(c) {
  const sid=c.id||c.supabase_id||"";
  const isOpen=state.expanded===sid||state.expanded===c._pid;
  const status=c.outreach_status||"Not sent";
  const ss=STATUS_STYLE[status]||STATUS_STYLE["Not sent"];
  const ts=tierStyle(c.icp_tier);
  const loadingBrief=state.loadingId===`brief_${sid}`;
  const loadingNote=state.loadingId===`note_${sid}`;
  const loadingPromote=state.loadingId===`promote_${sid}`;
  const canPromote=!c.deal_id&&["Connected","Replied","Booked"].includes(status)&&sid;

  return `
    <div class="contact-row${isOpen?" open":""}">
      <div class="contact-header" onclick="toggleExpand('${sid||c._pid}')">
        <span class="tier-badge" style="background:${ts.bg};color:${ts.text}">T${esc(c.icp_tier)}</span>
        <div style="flex:1;min-width:0">
          <div class="contact-name">${esc(c.contact_name)}</div>
          <div class="contact-sub">${esc(c.title)} · ${esc(c.company)}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap">
          <span class="tag">${esc(c.sector)}</span>
          <span class="tag">${esc(c.headcount)}</span>
          <span class="status-pill" style="background:${ss.bg};color:${ss.text}">${esc(status)}</span>
          ${c.agent08_brief?`<span class="mini-badge" style="background:#E1F5EE;color:#04342C">briefed</span>`:""}
          ${c.linkedin_note?`<span class="mini-badge" style="background:#EEEDFE;color:#26215C">note</span>`:""}
          ${c.deal_id?`<span class="mini-badge" style="background:#EAF3DE;color:#27500A">in CRM</span>`:""}
          ${c.linkedin_url?`<span style="font-size:11px;color:#0A66C2;font-weight:500">LI</span>`:""}
        </div>
        <span style="font-size:11px;color:var(--text3);margin-left:6px">${isOpen?"▲":"▼"}</span>
      </div>

      ${isOpen?`
        <div class="contact-body">
          ${sid?`
          <div class="status-row">
            <div class="section-title">Outreach status</div>
            <div class="status-btns">
              ${STATUS_FLOW.map(s=>{
                const active=status===s;
                const sst=STATUS_STYLE[s];
                return `<button class="status-btn${active?" active":""}" style="${active?`background:${sst.bg};color:${sst.text};border-color:${sst.text}`:""}" onclick="setStatus('${sid}','${s}')">${esc(s)}</button>`;
              }).join("")}
            </div>
          </div>`:""}

          <div class="two-col">
            <div>
              <div class="section-title">Agent 08 — Research brief</div>
              ${c.agent08_brief
                ? `<div class="brief-text">${esc(c.agent08_brief)}</div>`
                : sid
                  ? `<button class="btn btn-primary" onclick="runBrief('${sid}')" ${state.loadingId?"disabled":""} style="width:100%">
                      ${loadingBrief?`<span class="spinner"></span>Running...`:"Run Agent 08 →"}
                    </button>`
                  : `<div style="font-size:12px;color:var(--text3)">Import contacts first to enable Agent 08.</div>`
              }
            </div>
            <div>
              <div class="section-title">LinkedIn connection note</div>
              ${c.linkedin_note?`
                <div class="note-box">${esc(c.linkedin_note)}</div>
                <div class="char-count${c.linkedin_note.length>200?" over":""}">${c.linkedin_note.length}/200 chars</div>
                <div style="display:flex;gap:6px;margin-bottom:6px">
                  <button class="btn btn-purple" onclick="copyNote(${JSON.stringify(c.linkedin_note).replace(/"/g,'&quot;')})" style="flex:1">Copy note</button>
                  ${c.linkedin_url?`<a href="${esc(c.linkedin_url.startsWith("http")?c.linkedin_url:"https://"+c.linkedin_url)}" target="_blank" rel="noopener" class="btn btn-blue">Open LI →</a>`:""}
                </div>
                ${sid?`<button class="btn" onclick="regenNote('${sid}')" ${state.loadingId?"disabled":""} style="width:100%;font-size:11px">${loadingNote?`<span class="spinner"></span>Regenerating...`:"Regenerate"}</button>`:""}
              `:sid?`
                <button class="btn btn-purple" onclick="genNote('${sid}')" ${state.loadingId?"disabled":""} style="width:100%">
                  ${loadingNote?`<span class="spinner"></span>Generating...`:"Generate LinkedIn note →"}
                </button>
                ${!c.agent08_brief?`<div style="font-size:11px;color:var(--text3);margin-top:6px">Tip: run Agent 08 first for a better note.</div>`:""}
              `:`<div style="font-size:12px;color:var(--text3)">Import contacts first.</div>`}
            </div>
          </div>

          ${canPromote?`
            <div class="promote-bar">
              <button class="btn btn-crm" onclick="promote('${sid}')" ${state.loadingId?"disabled":""} style="width:100%">
                ${loadingPromote?`<span class="spinner"></span>Promoting...`:"→ Promote to CRM deal"}
              </button>
              <div class="promote-hint">Creates a Contacted deal in the CRM with brief and notes pre-filled.</div>
            </div>
          `:""}
          ${c.deal_id?`<div class="in-crm">✓ Promoted to CRM deal</div>`:""}
        </div>
      `:""}
    </div>`;
}

function renderBatchBar(src) {
  const tier1=src.filter(c=>c.icp_tier==="1");
  const tier1Done=tier1.filter(c=>c.agent08_brief&&c.linkedin_note).length;
  if(state.batchRunning) return `
    <div class="bar">
      <div style="flex:1">
        <div style="font-size:12px;color:var(--text2);margin-bottom:4px">
          Running Agent 08 + notes... ${state.batchDone}/${state.batchTotal}
          ${state.batchCurrent?`<span style="color:var(--text3)"> — ${esc(state.batchCurrent)}</span>`:""}
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${state.batchTotal?Math.round((state.batchDone/state.batchTotal)*100):0}%;background:var(--purple)"></div></div>
      </div>
      <span style="font-size:11px;color:var(--text3)">${state.batchTotal?Math.round((state.batchDone/state.batchTotal)*100):0}%</span>
    </div>`;
  if(tier1Done===tier1.length&&tier1.length>0) return `
    <div class="bar"><div class="alert alert-green" style="margin:0;flex:1">✓ All ${tier1.length} Tier 1 contacts briefed and notes ready.</div></div>`;
  return `
    <div class="bar">
      <div style="flex:1;font-size:12px;color:var(--text2)">
        <strong>${tier1.length-tier1Done} Tier 1 contacts</strong> still need briefing. Run Agent 08 + LinkedIn notes for all automatically.
      </div>
      <button class="btn btn-purple" onclick="runAllTier1()">Run all Tier 1 →</button>
    </div>`;
}

function renderMetrics(src) {
  const statusCounts=STATUS_FLOW.reduce((a,s)=>{a[s]=src.filter(c=>(c.outreach_status||"Not sent")===s).length;return a;},{});
  return `<div class="metrics">
    ${STATUS_FLOW.map(s=>{
      const ss=STATUS_STYLE[s];
      const active=state.filterStatus===s;
      return `<div class="metric${active?" active":""}" onclick="setStatusFilter('${s}')">
        <div class="metric-label">${esc(s)}</div>
        <div class="metric-value" style="color:${ss.text}">${statusCounts[s]||0}</div>
      </div>`;
    }).join("")}
  </div>`;
}

// ── event handlers ────────────────────────────────────────────────────────────
function toggleExpand(id) { state.expanded=state.expanded==id?null:id; render(); }
function setStatus(sid,s) { updateStatus(sid,s); }
function runBrief(sid) { runAgent08(sid); }
function genNote(sid) { generateNote(sid); }
function regenNote(sid) { generateNote(sid); }
function promote(sid) { promoteToDeal(sid); }
function setStatusFilter(s) { state.filterStatus=state.filterStatus===s?"All":s; render(); }

// ── main render ───────────────────────────────────────────────────────────────
function render() {
  const src = state.view==="import" ? state.parsed : state.contacts;
  const filt = filtered();

  const tier1c  = src.filter(c=>c.icp_tier==="1").length;
  const tier2c  = src.filter(c=>c.icp_tier==="2").length;
  const tier3c  = src.filter(c=>c.icp_tier==="3").length;
  const briefed = src.filter(c=>c.agent08_brief).length;
  const irrelevantCount = state.contacts.filter(c=>c.outreach_status==="Irrelevant").length;

  document.getElementById("app").innerHTML = `
    <div class="header">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="logo"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 2l5 5-5 5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span style="font-size:15px;font-weight:500">LinkedIn Outreach</span>
        <span class="badge">${src.length} contacts</span>
      </div>
      <div class="tabs">
        <button class="tab${state.view==="import"?" active":""}" onclick="switchView('import')">Import CSV</button>
        <button class="tab${state.view==="contacts"?" active":""}" onclick="switchView('contacts')">All contacts${state.contacts.length?` (${state.contacts.length})`:""}</button>
      </div>
    </div>

    ${state.view==="import"?`
      ${state.parsed.length===0?`
        <div class="card" style="text-align:center;padding:40px">
          <div style="font-size:13px;color:var(--text2);margin-bottom:16px">Upload your Apollo CSV export</div>
          <input type="file" accept=".csv" onchange="onFile(event)" style="font-size:13px">
        </div>
      `:`
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px">
          ${[{l:"Total",v:state.parsed.length},{l:"Tier 1",v:tier1c,c:"#1D9E75"},{l:"Tier 2",v:tier2c,c:"#EF9F27"},{l:"Tier 3",v:tier3c,c:"#888780"},{l:"Briefed",v:briefed,c:"var(--purple)"}]
            .map(m=>`<div style="background:var(--bg2);border-radius:var(--radius);padding:10px 12px"><div style="font-size:11px;color:var(--text2);margin-bottom:3px">${m.l}</div><div style="font-size:22px;font-weight:500;color:${m.c||"var(--text)"}">${m.v}</div></div>`).join("")}
        </div>

        ${!state.imported?`
          <div class="bar">
            ${state.importing?`
              <div style="flex:1">
                <div style="font-size:12px;color:var(--text2);margin-bottom:4px">${esc(state.phase)} ${state.progress}%</div>
                <div class="progress-track"><div class="progress-fill" style="width:${state.progress}%;background:var(--green)"></div></div>
              </div>
            `:`
              <div style="flex:1;font-size:12px;color:var(--text2)">${state.parsed.length} contacts parsed and scored. Ready to import to contacts table.</div>
              <button class="btn btn-primary" onclick="importContacts()">Import to contacts →</button>
            `}
          </div>
        `:`
          <div class="alert alert-green">✓ ${state.importedCount} new contacts saved · ${state.skippedCount} already existed and linked.</div>
        `}

        ${renderBatchBar(state.parsed)}

        <div class="toolbar">
          <input type="text" class="search" placeholder="Search name, company, title..." value="${esc(state.search)}" oninput="setSearch(this.value)">
          <div style="display:flex;gap:4px">
            ${["All","1","2","3"].map(t=>`<button class="btn btn-sm${state.filterTier===t?" btn-primary":""}" onclick="setTierFilter('${t}')">${t==="All"?"All":` T${t}`}</button>`).join("")}
          </div>
          <span style="font-size:11px;color:var(--text3);margin-left:auto">${filt.length} shown</span>
        </div>
        ${filt.map(c=>renderContactCard(c)).join("")}
      `}
    `:`
      ${state.phase?`<div class="empty"><span class="spinner spinner-dark"></span> ${esc(state.phase)}</div>`:`
        ${renderMetrics(state.contacts)}
        ${renderBatchBar(state.contacts)}
        <div class="toolbar">
          <input type="text" class="search" placeholder="Search name, company, title..." value="${esc(state.search)}" oninput="setSearch(this.value)">
          <div style="display:flex;gap:4px">
            ${["All","1","2","3"].map(t=>`<button class="btn btn-sm${state.filterTier===t?" btn-primary":""}" onclick="setTierFilter('${t}')">${t==="All"?"All":`T${t}`}</button>`).join("")}
          </div>
          ${irrelevantCount>0?`<button class="btn btn-sm" style="${state.showIrrelevant?"background:var(--bg3)":""}" onclick="state.showIrrelevant=!state.showIrrelevant;render()">${state.showIrrelevant?"Hide":"Show"} irrelevant (${irrelevantCount})</button>`:""}
          <span style="font-size:11px;color:var(--text3);margin-left:auto">${filt.length} shown</span>
        </div>
        ${filt.length?filt.map(c=>renderContactCard(c)).join(""):`<div class="empty">No contacts found.</div>`}
      `}
    `}
  `;
}

function setSearch(v) { state.search=v; render(); }
function setTierFilter(v) { state.filterTier=v; render(); }
function switchView(v) {
  state.view=v; state.search=""; state.filterTier="All"; state.filterStatus="All";
  if(v==="contacts"&&!state.contacts.length) loadContacts();
  else render();
}

render();
</script>
</body>
</html>
